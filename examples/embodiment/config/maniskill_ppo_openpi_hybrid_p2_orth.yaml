defaults:
  - env/maniskill_put_on_plate_in_scene_25_main@env.train
  - env/maniskill_put_on_plate_in_scene_25_main@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor: 0-5
    env: 0-2
    rollout: 4-6

runner:
  task_type: embodied
  logger:
    log_path: "/data/temp/"
    project_name: rlinf
    experiment_name: "maniskill_ppo_openpi_orth"
    logger_backends: ["tensorboard"]

  max_epochs: 240
  max_steps: -1
  only_eval: False
  val_check_interval: 5
  save_interval: 40

  resume_dir: /home/wyh/RLinf/logs/20260422-01:41:40-maniskill_ppo_openpi_hybrid_p2_orth/maniskill_ppo_openpi_orth/checkpoints/global_step_200
  # resume_dir : null
  ckpt_path: null

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  rollout_epoch: 2     #4
  eval_rollout_epoch: 1
  reward_type: chunk_level
  logprob_type: token_level
  entropy_type: chunk_level
  update_epoch: 4

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"

  bootstrap_type: always
  kl_beta: 0 
  entropy_bonus: 0   # 0 for flow_sde,0.005 for flow_noise
  clip_ratio_high: 0.3   
  clip_ratio_low: 0.3 
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95 

  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 36
    rpc_timeout_s: 600
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 80
    max_steps_per_rollout_epoch: 80
    enable_offload: False
    init_params:
      use_multiple_plates: False

  eval:
    total_num_envs: 6
    rpc_timeout_s: 600
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 80
    max_steps_per_rollout_epoch: 80
    use_fixed_reset_state_ids: True
    group_size: ${algorithm.group_size}
    is_eval: True
    enable_offload: False
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    init_params:
      use_multiple_plates: False

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: True
  pipeline_stage_num: 2

  model:
    model_path: "/data/yqt/model/pi0"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 24   #12
  global_batch_size: 144
  seed: 123
  enable_offload: True

  model:
    model_path: "/data/yqt/model/pi0"
    model_name: "openpi"
    precision: null
    num_action_chunks: 5
    action_dim: 7
    add_value_head: True
    openpi:
      config_name: "pi0_maniskill"
      num_images_in_input: 1
      noise_level: 0.5
      action_chunk: ${actor.model.num_action_chunks}
      num_steps: ${actor.model.num_steps}
      train_expert_only: True
      action_env_dim: ${actor.model.action_dim}
      noise_method: "flow_sde"
      use_orth_noise: True
      use_gradient_reweight: False    
      add_value_head: ${actor.model.add_value_head}
      detach_critic_input: True
      action_horizon: 8
      # # noise_params: [0.16, 0.12, 200]
      joint_logprob: False   #False for flow_sde, True for flow_noise
      # value_after_vlm: False
    policy_setup: widowx_bridge

  optim:
    lr: 1.0e-5  
    value_lr: 1.55e-4   
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    gradient_checkpointing: False    
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
